name: Smart Parking CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parking_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose
    
    - name: Clean up old containers
      run: |
        docker stop $(docker ps -aq) 2>/dev/null || true
        docker rm $(docker ps -aq) 2>/dev/null || true
    
    - name: Build Docker Images
      run: |
        docker-compose build
    
    - name: Run Containers and Capture Logs
      run: |
        docker-compose up -d
        echo "Waiting for services to initialize..."
        sleep 10
        
        echo "=== PostgreSQL Status ==="
        docker-compose exec -T postgres pg_isready -U postgres || echo "PostgreSQL not ready"
        
        echo "=== Backend Container Logs ==="
        docker-compose logs backend --tail=100
        
        echo "=== Backend Container Status ==="
        docker inspect smart_parking_backend --format='{{.State.Status}} {{.State.Error}}'
    
    - name: Test Backend API
      run: |
        echo "Testing API endpoint..."
        curl -v http://localhost:5000/api/health || echo "API not responding"
        echo "=== Complete Backend Logs ==="
        docker-compose logs backend
    
    - name: Cleanup
      if: always()
      run: |
        docker-compose down