name: Smart Parking CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_parking
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Docker Compose
      run: sudo apt-get update && sudo apt-get install -y docker-compose
    
    - name: Build and Run Containers
      env:
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}         # 👈 ADDED
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}  # 👈 ADDED
      run: |
        docker-compose up -d
        sleep 15
        docker-compose ps
        docker-compose logs backend
        curl http://localhost:5000/api/health || echo "Health check failed"
    
    - name: Cleanup
      if: always()
      run: docker-compose down

  push-to-ecr:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & push backend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPO: ${{ secrets.ECR_REPO_BACKEND }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          -f Parking_frontend/Dockerfile.backend \
          -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPO:latest \
          Parking_frontend/
        docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPO:latest

    - name: Build & push frontend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPO: ${{ secrets.ECR_REPO_FRONTEND }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          -f Parking_frontend/Dockerfile \
          -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPO:latest \
          Parking_frontend/
        docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPO:latest

    - name: Summary
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "✅ Images pushed to ECR"
        echo "Backend: $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:$IMAGE_TAG"
        echo "Frontend: $ECR_REGISTRY/${{ secrets.ECR_REPO_FRONTEND }}:$IMAGE_TAG"