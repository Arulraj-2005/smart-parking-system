name: Smart Parking CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --timeout 5s
          --retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Backend Dependencies
      run: |
        cd Parking_frontend/server
        npm ci
      continue-on-error: true
    
    - name: Run Backend Tests
      run: |
        cd Parking_frontend/server
        echo "Skipping tests - no test script configured"
      continue-on-error: true
    
    - name: Build Docker Images
      run: |
        docker-compose build
    
    - name: Run Docker Containers
      run: |
        docker-compose up -d
        sleep 10
    
    - name: Test API Health
      run: |
        curl -f http://localhost:5000/api/health || echo "API not ready yet"
      continue-on-error: true
    
    - name: Show Docker Logs
      run: |
        docker-compose logs
      continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy Notification
      run: |
        echo "✅ Deployment ready!"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "To deploy to production, add your deployment commands here:"
        echo "- AWS ECS"
        echo "- Google Cloud Run"
        echo "- Azure Container Instances"
        echo "- Or your own VPS"