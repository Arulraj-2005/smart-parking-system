services:
  postgres:
    image: postgres:15
    container_name: smart_parking_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_parking
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Parking_frontend/server/config/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - parking_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Parking_frontend
      dockerfile: Dockerfile.backend
    container_name: smart_parking_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: smart_parking
      JWT_SECRET: test_secret_key_for_ci
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}         # 👈 ADDED
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}  # 👈 ADDED
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parking_network

  frontend:
    build:
      context: ./Parking_frontend
      dockerfile: Dockerfile
    container_name: smart_parking_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - parking_network
    environment:
      VITE_API_URL: http://localhost:5000/api

networks:
  parking_network:
    driver: bridge

volumes:
  postgres_data: